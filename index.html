<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Fichaje - Profesorado EducaMadrid</title>
  
  <style>
    :root {
      --primary: #0056b3;
      --primary-hover: #004085;
      --success: #28a745;
      --danger: #dc3545;
    }
    *, *::before, *::after { box-sizing: border-box; }
    
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #f4f6f9; font-family: Arial, sans-serif; color: #333;
      overflow: hidden;
    }
    
    .container {
      width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; background: #fff;
    }
    
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
    }
    
    h1 { color: var(--primary); font-size: 20px; margin: 0; }
    .sub { font-size: 13px; color: #666; margin: 0; }
    
    .calendar-nav { display: flex; justify-content: center; align-items: center; gap: 30px; }
    .calendar-nav button { padding: 6px 14px; background: var(--primary); color: white; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
    .calendar-nav button:hover { background: var(--primary-hover); }
    
    .month-title { font-size: 18px; font-weight: bold; text-transform: capitalize; min-width: 150px; text-align: center; }
    
    .weekdays { display: table; width: 100%; text-align: center; font-weight: bold; background: #eee; border-radius: 4px; flex-shrink: 0; }
    .weekday { display: table-cell; width: 14.28%; padding: 10px 0; font-size: 13px; color: #555; }
    
    .days-grid { display: flex; flex-direction: column; flex-grow: 1; margin-top: 5px; width: 100%; }
    .row { display: flex; width: 100%; flex-grow: 1; }
    
    .day {
      width: 14.28%; border: 1px solid #e2e8f0; font-size: 16px; font-weight: bold;
      cursor: not-allowed; color: #cbd5e1; background-color: #f8fafc; padding: 8px;
      display: flex; align-items: flex-start; justify-content: flex-start;
    }
    
    .day.in-range { color: #334155; background-color: #fff; }
    
    .day.hoy {
      background-color: #fef08a !important; border: 3px solid #eab308 !important; color: #1e293b; cursor: pointer;
    }
    .day.hoy:hover { background-color: #fde047 !important; }
    
    /* Ventana Flotante / Modal de Fichaje */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.6); align-items: center; justify-content: center; z-index: 1000;
    }
    
    .modal-content {
      background: white; padding: 30px; border-radius: 8px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    .modal h2 { margin-top: 0; font-size: 22px; color: #1e293b; }
    .btn-group { display: flex; gap: 15px; margin-top: 20px; }
    
    .modal button { padding: 14px 20px; font-size: 15px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
    .btn-entrada { background-color: var(--success); color: white; width: 100%; }
    .btn-salida { background-color: var(--danger); color: white; width: 100%; }
    .btn-close { background-color: #64748b; color: white; margin-top: 20px; padding: 10px; font-size: 14px; width: 100%; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div>
        <h1>Control de Teletrabajo</h1>
        <p class="sub">Personal EducaMadrid</p>
      </div>
      
      <div class="calendar-nav">
        <button id="btnPrev" onclick="cambiarMes(-1)">◀ Mes Anterior</button>
        <div id="monthTitle" class="month-title"></div>
        <button id="btnNext" onclick="cambiarMes(1)">Siguiente Mes ▶</button>
      </div>
      
      <div style="width: 100px; text-align: right; font-size: 12px; color: #666;">v3.0 Fix-Type</div>
    </div>

    <div class="weekdays">
      <div class="weekday">Lunes</div>
      <div class="weekday">Martes</div>
      <div class="weekday">Miércoles</div>
      <div class="weekday">Jueves</div>
      <div class="weekday">Viernes</div>
      <div class="weekday">Sábado</div>
      <div class="weekday">Domingo</div>
    </div>

    <div id="daysGrid" class="days-grid"></div>
  </div>

  <div id="fichajeModal" class="modal">
    <div class="modal-content">
      <h2>Validar Identidad y Fichar</h2>
      <p id="modalFechaTexto" style="font-size:15px; margin: 5px 0 20px 0; color:#555;"></p>
      <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Se abrirá una ventana segura para registrar la acción en tu jornada de hoy.</p>
      
      <div class="btn-group">
        <button class="btn-entrada" onclick="redireccionarFichaje('Entrada')">Fichar Entrada ↗</button>
        <button class="btn-salida" onclick="redireccionarFichaje('Salida')">Fichar Salida ↗</button>
      </div>
      
      <button class="btn-close" onclick="cerrarModal()">Volver al Calendario</button>
    </div>
  </div>

  <script>
    // URL de tu Backend institucional
    const BACKEND_URL = "https://script.google.com/a/macros/educa.madrid.org/s/AKfycbwRxiYjVlQmEg-xAQX_WHn5dvw50fIvuIa-yJFrd7a77-cmGovS4JrPvivSTTxLIu6x8A/exec";

    const RANGO_MIN = new Date("2026-06-01T00:00:00");
    const RANGO_MAX = new Date("2027-06-30T23:59:59");

    let fechaActualVista = new Date();

    document.addEventListener("DOMContentLoaded", () => {
      const hoy = new Date();
      if (hoy < RANGO_MIN) {
        fechaActualVista = new Date(2026, 5, 1);
      } else if (hoy > RANGO_MAX) {
        fechaActualVista = new Date(2027, 5, 1);
      }
      renderizarCalendario();
    });

    function renderizarCalendario() {
      const grid = document.getElementById("daysGrid");
      const title = document.getElementById("monthTitle");
      grid.textContent = ""; 

      const año = fechaActualVista.getFullYear();
      const mes = fechaActualVista.getMonth();

      title.textContent = fechaActualVista.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });

      const primerDiaMes = new Date(año, mes, 1);
      const ultimoDiaMes = new Date(año, mes + 1, 0);

      let diaInicioSemana = primerDiaMes.getDay() - 1;
      if (diaInicioSemana === -1) diaInicioSemana = 6;

      const totalDias = ultimoDiaMes.getDate();
      const hoy = new Date();

      let diaContador = 1;
      let filaActual = document.createElement("div");
      filaActual.classList.add("row");

      for (let i = 0; i < diaInicioSemana; i++) {
        let celdaVacia = document.createElement("div");
        celdaVacia.classList.add("day");
        filaActual.appendChild(celdaVacia);
      }

      while (diaContador <= totalDias) {
        if (filaActual.children.length === 7) {
          grid.appendChild(filaActual);
          filaActual = document.createElement("div");
          filaActual.classList.add("row");
        }

        const celdaDia = document.createElement("div");
        celdaDia.classList.add("day");
        celdaDia.textContent = diaContador;

        const fechaCelda = new Date(año, mes, diaContador);

        if (fechaCelda >= RANGO_MIN && fechaCelda <= RANGO_MAX) {
          celdaDia.classList.add("in-range");
          
          if (fechaCelda.getDate() === hoy.getDate() && 
              fechaCelda.getMonth() === hoy.getMonth() && 
              fechaCelda.getFullYear() === hoy.getFullYear()) {
            celdaDia.classList.add("hoy");
            celdaDia.addEventListener("click", () => abrirModalFichaje(fechaCelda));
          }
        }

        filaActual.appendChild(celdaDia);
        diaContador++;
      }

      while (filaActual.children.length < 7) {
        let celdaVacia = document.createElement("div");
        celdaVacia.classList.add("day");
        filaActual.appendChild(celdaVacia);
      }
      grid.appendChild(filaActual);
    }

    function cambiarMes(direccion) {
      fechaActualVista.setMonth(fechaActualVista.getMonth() + direccion);
      renderizarCalendario();
    }

    function abrirModalFichaje(fecha) {
      const modal = document.getElementById("fichajeModal");
      document.getElementById("modalFechaTexto").textContent = fecha.toLocaleDateString('es-ES', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      modal.style.display = "flex";
    }

    // Corregido: Limpieza y codificación estricta del parámetro URI
    function redireccionarFichaje(tipo) {
      const parametroTipo = encodeURIComponent(tipo.trim());
      const urlFinal = BACKEND_URL + "?tipo=" + parametroTipo;
      
      window.open(urlFinal, "_blank"); 
      cerrarModal();
    }

    function cerrarModal() {
      document.getElementById("fichajeModal").style.display = "none";
    }
  </script>
</body>
</html>
